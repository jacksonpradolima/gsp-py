name: Upload Python Package to PyPI when a Release is Created

on:
  workflow_dispatch:

jobs:
  pypi-publish:
    name: Publish release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/gsppy/
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM (CycloneDX)
        run: syft packages dist -o cyclonedx-json=dist/sbom.json

      - name: Sign distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: >-
            dist/*.whl
            dist/*.tar.gz

      - name: Move Sigstore attestations and SBOM out of dist
        run: |
          mkdir -p attestations
          if ls dist/*.sigstore.json 1> /dev/null 2>&1; then
            mv dist/*.sigstore.json attestations/
          fi
          if [ -f dist/sbom.json ]; then
            mv dist/sbom.json attestations/
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.2.1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            attestations/*.sigstore.json
            attestations/sbom.json

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: false
